apiVersion: apps/v1
kind: Deployment
metadata:
  name: licznik-deployment
  labels:
    app: licznik
spec:
  replicas: 4
  selector:
    matchLabels:
      app: licznik
  template:
    metadata:
      labels:
        app: licznik
    spec:
      containers:
        - name: licznik
          image: devops-counter-app:1.0.4
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"