apiVersion: apps/v1
kind: Deployment
metadata:
  name: licznik-rolling
  labels:
    app: licznik-rolling
spec:
  replicas: 4
  selector:
    matchLabels:
      app: licznik-rolling
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2
      maxSurge: 25%
  template:
    metadata:
      labels:
        app: licznik-rolling
        version: "1.0.4"
    spec:
      containers:
        - name: licznik
          image: devops-counter-app:1.0.4
          imagePullPolicy: Never
          ports:
            - containerPort: 3000